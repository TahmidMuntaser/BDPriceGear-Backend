name: Hourly Product Scraping

on:
  schedule:
    # Runs every 2 hours at minute 0
    - cron: '0 */2 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub Actions tab

jobs:
  trigger-scraping:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Product Update on Scraper Service
        run: |
          echo "Triggering product update at $(date)"
          echo "Target: Dedicated Scraper Service (bdpricegear-scraper)"
          curl -X POST https://bdpricegear-scraper.onrender.com/api/update/ \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}\n" \
            --max-time 10 \
            --retry 2
          echo "Update triggered successfully on scraper service!"
          echo "Main API server (bdpricegear) remains available for users."