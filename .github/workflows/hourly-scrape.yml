name: Product Scraper Trigger

on:
  schedule:
    # Runs every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  trigger-scraping:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Product Update on Scraper Service
        run: |
          echo "Triggering product update at $(date)"
          echo "Target: Dedicated Scraper Service (bdpricegear-scraper)"

          echo "Step 1: Warming up Render service..."
          curl -I https://bdpricegear-scraper.onrender.com \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5

          echo "Step 2: Sending scraping trigger request..."

          curl -X POST https://bdpricegear-scraper.onrender.com/api/update/ \
            -H "Content-Type: application/json" \
            --max-time 60 \
            --retry 3 \
            --retry-delay 5 \
            -w "\nHTTP Status: %{http_code}\n"

          echo "Scraper trigger request completed!"
